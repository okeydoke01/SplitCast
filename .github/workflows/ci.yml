name: SplitCast CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-frontend:
    name: Build Next.js frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Compile & Build Next.js
        run: npm run build
        working-directory: frontend

  build-wasm:
    name: Build Soroban WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Compile Contracts (WASM target)
        run: cargo build --target wasm32-unknown-unknown --release

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build-frontend]
    # Only run deploy on pushes to main/master branches, not on pull requests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build Next.js with edge compatibility
        run: npx @cloudflare/next-on-pages
        working-directory: frontend

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: splitcast
          directory: frontend/.vercel/output
          branch: main

  lint-frontend:
    name: Lint + typecheck frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Run Eslint
        run: npm run lint
        working-directory: frontend

  lint-contracts:
    name: Lint Rust contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run cargo fmt --check
        run: cargo fmt --check

      - name: Run cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  test-contracts:
    name: Test Soroban contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Smart Contract Unit Tests
        run: cargo test
